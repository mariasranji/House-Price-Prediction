<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 700px;
            background: #fff;
            margin: 0 auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #34495e;
            font-size: 14px;
        }
        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            background-color: #fafafa;
        }
        input:focus, select:focus {
            border-color: #3498db;
            outline: none;
            background-color: #fff;
        }
        .btn-container {
            grid-column: span 2;
            text-align: center;
            margin-top: 25px;
        }
        @media (max-width: 600px) {
            .btn-container { grid-column: span 1; }
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏠 House Price Prediction Engine</h2>
    <form id="predictionForm">
        <div class="form-grid">
            <div class="form-group">
                <label for="OverallQual">Overall Quality (1-10)</label>
                <input type="number" id="OverallQual" value="7" min="1" max="10" required>
            </div>
            <div class="form-group">
                <label for="GrLivArea">Above Grade Living Area (sq ft)</label>
                <input type="number" id="GrLivArea" value="1700" required>
            </div>
            <div class="form-group">
                <label for="GarageCars">Garage Car Capacity</label>
                <input type="number" id="GarageCars" value="2" required>
            </div>
            <div class="form-group">
                <label for="GarageArea">Garage Area (sq ft)</label>
                <input type="number" id="GarageArea" value="540" required>
            </div>
            <div class="form-group">
                <label for="TotalBsmtSF">Total Basement Area (sq ft)</label>
                <input type="number" id="TotalBsmtSF" value="1000" required>
            </div>
            <div class="form-group">
                <label for="1stFlrSF">First Floor Area (sq ft)</label>
                <input type="number" id="1stFlrSF" value="1100" required>
            </div>
            <div class="form-group">
                <label for="FullBath">Full Bathrooms</label>
                <input type="number" id="FullBath" value="2" required>
            </div>
            <div class="form-group">
                <label for="TotRmsAbvGrd">Total Rooms Above Grade</label>
                <input type="number" id="TotRmsAbvGrd" value="7" required>
            </div>
            <div class="form-group">
                <label for="YearBuilt">Year Built</label>
                <input type="number" id="YearBuilt" value="2003" required>
            </div>
            <div class="form-group">
                <label for="YearRemodAdd">Year Remodeled</label>
                <input type="number" id="YearRemodAdd" value="2005" required>
            </div>

            <div class="form-group">
                <label for="MSZoning">Zoning Classification</label>
                <select id="MSZoning">
                    <option value="RL">Residential Low Density (RL)</option>
                    <option value="RM">Residential Medium Density (RM)</option>
                    <option value="FV">Floating Village Residential (FV)</option>
                    <option value="RH">Residential High Density (RH)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="Utilities">Utilities Available</label>
                <select id="Utilities">
                    <option value="AllPub">All Public Utilities</option>
                    <option value="NoSeWa">No Electricity / Gas</option>
                </select>
            </div>
            <div class="form-group">
                <label for="BldgType">Building Type</label>
                <select id="BldgType">
                    <option value="1Fam">Single-Family Detached</option>
                    <option value="TwnhsE">Townhouse End Unit</option>
                    <option value="Duplex">Duplex</option>
                </select>
            </div>
            <div class="form-group">
                <label for="Heating">Type of Heating</label>
                <select id="Heating">
                    <option value="GasA">Gas Forced Warm Air</option>
                    <option value="GasW">Gas Hot Water/Steam</option>
                    <option value="Grav">Gravity Furnace</option>
                </select>
            </div>
            <div class="form-group">
                <label for="KitchenQual">Kitchen Quality</label>
                <select id="KitchenQual">
                    <option value="Gd">Good (Gd)</option>
                    <option value="TA">Average/Typical (TA)</option>
                    <option value="Ex">Excellent (Ex)</option>
                    <option value="Fa">Fair (Fa)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="SaleCondition">Sale Condition</label>
                <select id="SaleCondition">
                    <option value="Normal">Normal Sale</option>
                    <option value="Partial">Partial (New Home)</option>
                    <option value="Abnorml">Abnormal Sale</option>
                </select>
            </div>
            <div class="form-group">
                <label for="LandSlope">Slope of Land</label>
                <select id="LandSlope">
                    <option value="Gtl">Gentle Slope</option>
                    <option value="Mod">Moderate Slope</option>
                    <option value="Sev">Severe Slope</option>
                </select>
            </div>

            <div class="btn-container">
                <button type="submit" id="submitBtn">Calculate Estimated Value</button>
            </div>
        </div>
    </form>

    <div id="result" class="result-box"></div>
</div>

<script>
    document.getElementById('predictionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');
        
        submitBtn.innerText = "Processing...";
        submitBtn.disabled = true;
        resultDiv.style.display = "none";

        // 1. Package form fields into a key-value data payload object
        const payload = {
            OverallQual: parseInt(document.getElementById('OverallQual').value),
            GrLivArea: parseInt(document.getElementById('GrLivArea').value),
            GarageCars: parseInt(document.getElementById('GarageCars').value),
            GarageArea: parseInt(document.getElementById('GarageArea').value),
            TotalBsmtSF: parseInt(document.getElementById('TotalBsmtSF').value),
            "1stFlrSF": parseInt(document.getElementById('1stFlrSF').value),
            FullBath: parseInt(document.getElementById('FullBath').value),
            TotRmsAbvGrd: parseInt(document.getElementById('TotRmsAbvGrd').value),
            YearBuilt: parseInt(document.getElementById('YearBuilt').value),
            YearRemodAdd: parseInt(document.getElementById('YearRemodAdd').value),
            MSZoning: document.getElementById('MSZoning').value,
            Utilities: document.getElementById('Utilities').value,
            BldgType: document.getElementById('BldgType').value,
            Heating: document.getElementById('Heating').value,
            KitchenQual: document.getElementById('KitchenQual').value,
            SaleCondition: document.getElementById('SaleCondition').value,
            LandSlope: document.getElementById('LandSlope').value
        };

        try {
            // 2. Dispatch a asynchronous POST request to your API
            const response = await fetch('http://127.0.0.1:5000/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok && data.status === 'success') {
                // Format numeric output into localized currency representation
                const formattedPrice = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(data.predictions[0]);

                resultDiv.className = "result-box success";
                resultDiv.innerHTML = `Estimated Market Value: <strong>${formattedPrice}</strong>`;
            } else {
                resultDiv.className = "result-box error";
                resultDiv.innerText = `Server Error: ${data.error || 'Unable to compute prediction.'}`;
            }
        } catch (error) {
            resultDiv.className = "result-box error";
            resultDiv.innerText = "Error connecting to backend API. Ensure Flask is active.";
        } finally {
            submitBtn.innerText = "Calculate Estimated Value";
            submitBtn.disabled = false;
            resultDiv.style.display = "block";
        }
    });
</script>
</body>
</html>
